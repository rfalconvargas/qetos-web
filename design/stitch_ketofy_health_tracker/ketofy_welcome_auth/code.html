<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        
        body {
            background-color: #FBF9F6; /* Warm Cream Base */
            color: #071834; /* Deep Cobalt Base */
            -webkit-font-smoothing: antialiased;
        }

        .fade-in {
            animation: fadeIn 1s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .action-pill {
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .action-pill:active {
            transform: scale(0.96);
        }

        .blur-bg {
            backdrop-filter: blur(8px);
            background-color: rgba(251, 249, 246, 0.8);
        }
    </style>

<body class="flex items-center justify-center min-h-screen p-space-6 overflow-hidden">
<!-- Authentication Overlay Container -->
<main class="fade-in w-full max-w-md flex flex-col items-center" id="auth-overlay">
<!-- Header Section -->
<header class="text-center mb-space-8 flex flex-col items-center">
<div class="mb-space-6 w-20 h-20 rounded-full overflow-hidden border border-outline-variant bg-surface-container-lowest flex items-center justify-center">
<img alt="Ketofy App Logo" class="w-16 h-16 object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAho9vpjI9JTcB0rTND_2Qz57MASLWU5Rex1uf5EJ4LHq8i-azCJiAln0fpSLufffGT0gz6RtHzDMKvLcB1CmzMmZZDYULvcLxNrW0XNfjXG4DvjdmmgWw4-nqNLwcn97_6JLZzaYUE7jH5XpwmWw4h_zkxvhSO1VXAJgeVD9g5nD8ccXBno7DpvKyL4lbSlvCNeb1_Eobk3vVHm8XxElNoQwUm89yTohyLF1LOsrYg30-Ky8JsaT2iYInS_3eklSTavN1DvBe1lA"/>
</div>
<h1 class="font-display-xl text-display-xl text-primary mb-space-2">
                Welcome to Ketofy.
            </h1>
<p class="font-body-base text-body-base text-text-muted tracking-wide">
                Your protocol awaits.
            </p>
</header>
<!-- Action Stack -->
<section class="w-full space-y-space-4">
<!-- Google Auth -->
<button class="action-pill w-full flex items-center justify-center py-space-4 px-space-6 border border-primary bg-surface-container-lowest rounded-full group">
<span class="material-symbols-outlined mr-space-3 text-primary" data-icon="google">google</span>
<span class="font-body-base text-body-base text-primary font-semibold">Continue with Google</span>
</button>
<!-- Instagram Auth -->
<button class="action-pill w-full flex items-center justify-center py-space-4 px-space-6 bg-accent-lavender rounded-full group">
<span class="material-symbols-outlined mr-space-3 text-primary" data-icon="photo_camera">photo_camera</span>
<span class="font-body-base text-body-base text-primary font-semibold">Connect with Instagram</span>
</button>
<!-- Separator -->
<div class="flex items-center py-space-4">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="px-space-4 font-caption text-caption text-text-muted">OR</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Email/Phone Input -->
<div class="space-y-space-3">
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-full py-space-3 px-space-6 font-body-base text-body-base focus:ring-2 focus:ring-primary-container transition-shadow placeholder:text-outline" placeholder="Email or Phone Number" type="text"/>
</div>
<button class="action-pill w-full bg-primary text-on-primary rounded-full py-space-4 px-space-6 font-body-base text-body-base font-semibold transition-colors hover:bg-primary-container" id="magic-link-btn">
                    Send Magic Link / SMS OTP
                </button>
</div>
</section>
<!-- Footer Metadata -->
<footer class="mt-space-8 text-center px-space-6">
<p class="font-caption text-caption text-text-muted">
                By continuing, you agree to our <a class="underline decoration-outline-variant" href="#">Terms of Service</a> and <a class="underline decoration-outline-variant" href="#">Privacy Policy</a>. 
            </p>
<div class="mt-space-8 flex justify-center space-x-space-2 opacity-40">
<span class="material-symbols-outlined text-[16px]" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-[16px]" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-[16px]" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
</footer>
</main>
<!-- Background Atmospheric Decor -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-accent-teal/20 rounded-full blur-[100px] -z-10"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-accent-lavender/30 rounded-full blur-[120px] -z-10"></div>
<script>
        // Simple micro-interaction for the magic link button
        const magicBtn = document.getElementById('magic-link-btn');
        
        magicBtn.addEventListener('click', () => {
            const originalText = magicBtn.innerText;
            magicBtn.innerText = 'Sending...';
            magicBtn.classList.add('opacity-80');
            
            setTimeout(() => {
                magicBtn.innerHTML = '<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span> Sent';
                magicBtn.style.backgroundColor = '#E8F0EC';
                magicBtn.style.color = '#071834';
                
                // Simulate transition out after success
                setTimeout(() => {
                    document.getElementById('auth-overlay').style.opacity = '0';
                    document.getElementById('auth-overlay').style.transition = 'opacity 1.5s ease-in-out';
                    document.getElementById('auth-overlay').style.transform = 'translateY(-20px)';
                }, 1000);
            }, 1500);
        });

        // Interactive background shift
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            document.querySelector('.fixed.top-\\[-10\\%\\]').style.transform = `translate(${x * 20}px, ${y * 20}px)`;
            document.querySelector('.fixed.bottom-\\[-10\\%\\]').style.transform = `translate(${-x * 30}px, ${-y * 30}px)`;
        });
    </script>
</body></html>
